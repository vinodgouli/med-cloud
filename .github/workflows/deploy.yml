name: Deploy Med Cloud App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/med-cloud-app .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/med-cloud-app

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo docker stop medcloud || true
          sudo docker rm medcloud || true
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/med-cloud-app
          sudo docker run -d -p 8000:8000 \
            -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            -e DEBUG="False" \
            -e ALLOWED_HOSTS="*" \
            --name medcloud \
            ${{ secrets.DOCKER_USERNAME }}/med-cloud-app
