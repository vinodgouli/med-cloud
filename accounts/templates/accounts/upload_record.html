<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload Medical Record - Medical Cloud</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a3a3a;
      padding: 20px;
    }

    main {
      max-width: 500px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 30px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      padding: 40px 50px;
      display: flex;
      flex-direction: column;
      gap: 35px;
      z-index: 10;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #3a3a3a;
      text-shadow: 0 2px 5px rgba(255, 255, 255, 0.7);
      user-select: none;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 25px;
      text-align: left;
    }

    label {
      font-weight: 600;
      font-size: 1.1rem;
      color: #3a3a3a;
      display: block;
      margin-bottom: 8px;
      user-select: none;
    }

    input[type="file"], input[type="text"], textarea {
      width: 100%;
      padding: 14px 15px;
      border: 2px solid #89f7fe;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
      outline: none;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.07);
      font-family: 'Poppins', sans-serif;
    }

    input[type="file"]:focus,
    input[type="text"]:focus,
    textarea:focus {
      border-color: #66a6ff;
      box-shadow: 0 0 8px rgba(102, 166, 255, 0.6);
    }

    small {
      color: #666666;
      font-size: 0.85rem;
      margin-top: -15px;
      margin-bottom: 15px;
      display: block;
    }

    button[type="submit"] {
      background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
      color: #1a1a1a;
      font-weight: 700;
      padding: 16px 0;
      font-size: 1.3rem;
      border-radius: 50px;
      box-shadow: 0 8px 20px rgba(102, 166, 255, 0.5);
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      user-select: none;
      margin-top: 10px;
    }

    button[type="submit"]:hover,
    button[type="submit"]:focus {
      background: linear-gradient(135deg, #66a6ff 0%, #89f7fe 100%);
      box-shadow: 0 12px 40px rgba(102, 166, 255, 0.7);
      transform: translateY(-4px);
      outline: none;
    }

    button[type="submit"]:active {
      transform: scale(0.95);
      box-shadow: 0 6px 15px rgba(102, 166, 255, 0.4);
    }

    a.back-link {
      margin-top: 20px;
      font-weight: 600;
      color: #66a6ff;
      text-decoration: none;
      font-size: 1rem;
      user-select: none;
      display: inline-block;
      text-align: center;
      transition: color 0.3s ease;
    }

    a.back-link:hover,
    a.back-link:focus {
      color: #89f7fe;
      outline: none;
    }

    /* Responsive */
    @media (max-width: 520px) {
      main {
        width: 90vw;
        padding: 30px 25px;
      }
      h1 {
        font-size: 2.4rem;
      }
      button[type="submit"] {
        font-size: 1.1rem;
        padding: 14px 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Upload Medical Record</h1>
    <form method="post" enctype="multipart/form-data" novalidate>
      {% csrf_token %}
      
      <label for="{{ form.file.id_for_label }}">{{ form.file.label }}</label>
      {{ form.file }}

      <label for="{{ form.keywords.id_for_label }}">{{ form.keywords.label }}</label>
      {{ form.keywords }}
      <small>{{ form.keywords.help_text }}</small>

      <button type="submit">Upload</button>
    </form>
    <a href="{% url 'patient_dashboard' %}" class="back-link" aria-label="Back to Patient Dashboard">← Back to Dashboard</a>
  </main>
</body>
</html>
