<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Medical Cloud</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
      user-select: none;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a3a3a;
      padding: 20px;
      position: relative;
    }

    main {
      position: relative;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      padding: 40px 45px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      z-index: 10;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: #3a3a3a;
      text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
      margin-bottom: 10px;
      user-select: none;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 22px;
      text-align: left;
    }

    form p {
      font-size: 1.05rem;
      color: #3a3a3a;
    }

    input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      padding: 14px 15px;
      border: 2px solid #89f7fe;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
      outline: none;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.07);
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus {
      border-color: #66a6ff;
      box-shadow: 0 0 8px rgba(102, 166, 255, 0.6);
    }

    button[type="submit"] {
      background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
      color: #1a1a1a;
      font-weight: 700;
      padding: 16px 0;
      font-size: 1.3rem;
      border-radius: 50px;
      box-shadow: 0 8px 20px rgba(102, 166, 255, 0.5);
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      user-select: none;
    }

    button[type="submit"]:hover,
    button[type="submit"]:focus {
      background: linear-gradient(135deg, #66a6ff 0%, #89f7fe 100%);
      box-shadow: 0 12px 40px rgba(102, 166, 255, 0.7);
      transform: translateY(-4px);
      outline: none;
    }

    button[type="submit"]:active {
      transform: scale(0.95);
      box-shadow: 0 6px 15px rgba(102, 166, 255, 0.4);
    }

    a.home-link {
      margin-top: 10px;
      font-weight: 600;
      color: #66a6ff;
      text-decoration: none;
      font-size: 1rem;
      user-select: none;
      transition: color 0.3s ease;
      display: inline-block;
      text-align: center;
    }

    a.home-link:hover,
    a.home-link:focus {
      color: #89f7fe;
      outline: none;
    }

    /* Responsive */
    @media (max-width: 460px) {
      main {
        width: 100%;
        padding: 30px 25px;
      }
      h1 {
        font-size: 2.3rem;
      }
      button[type="submit"] {
        font-size: 1.1rem;
        padding: 14px 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Login</h1>
    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
    <a href="{% url 'home' %}" class="home-link" aria-label="Go back to Home">← Back to Home</a>
  </main>
</body>
</html>
